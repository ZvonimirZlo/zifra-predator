<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
</head>

<body>

    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <div class="dashboard">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

        <nav class="sidebar" id="sidebar">
            <h2>RAV_v2</h2>
            <ul>
                <li onclick="rotateTo('encrypt')" class="nav-item active" id="nav-encrypt">ENCRYPTER</li>
                <li onclick="rotateTo('decrypt')" class="nav-item" id="nav-decrypt">DECRYPTER</li>
            </ul>
        </nav>

        <main class="content-viewport">
            <div class="carousel-3d" id="cube">
                <section class="pane encrypt-face">
                    <div class="panel-content">
                        <h2>ENCRYPTER</h2>
                        <label>MASTER KEY</label>
                        <label>MASTER PASSWORD:</label>
                        <div style="display: flex; gap: 5px; position: relative;">
                            <input type="password" class="passInput" placeholder="Enter secure key..."
                                oninput="updateStrength(this)">
                            <button onclick="togglePassword(this)" class="eye-btn">👁️</button>
                        </div>
                        <div class="strength-container">
                            <div class="strength-bar"></div>
                            <div class="strength-label">Strength: Empty</div>
                        </div>
                        <label>PLAINTEXT</label>
                        <textarea class="mainInput" placeholder="Message..."></textarea>
                        <button onclick="handleEncrypt()">PROCESS</button>
                        <div class="resultOutput output-box"></div>
                    </div>
                </section>

                <section class="pane decrypt-face">
                    <div class="panel-content">
                        <h2>DECRYPTER</h2>
                        <label>MASTER PASSWORD:</label>
                        <div style="display: flex; gap: 5px; position: relative;">
                            <input type="password" class="passInput" placeholder="Enter secure key..."
                                oninput="updateStrength(this)">
                            <button onclick="togglePassword(this)" class="eye-btn">👁️</button>
                        </div>
                        <div class="strength-container">
                            <div class="strength-bar"></div>
                            <div class="strength-label">Strength: Empty</div>
                        </div>
                        <label>CIPHERTEXT</label>
                        <textarea class="mainInput" placeholder="Cipher..."></textarea>
                        <button onclick="handleDecrypt()">PROCESS</button>
                        <div class="resultOutput output-box"></div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
