<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predator</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Tilt+Prism&display=swap"
        rel="stylesheet">

</head>

<body>
    <main>
        <div id="terminal-alert" class="terminal-alert">
            <div class="alert-content">
                <span class="alert-prefix">STATUS:</span>
                <span id="alert-message"></span>
            </div>
            <div class="alert-scanner"></div>
        </div>
        <!-- <div id="boot-sequencer">
            <div class="countdown-glyph">88:88</div>
            <div class="status-text first-line">INITIALIZING_YAUTJA_CORE</div>
            <div id="intro-lines">
                <div class="line">BIOMETRIC_SCAN_IN_PROGRESS....</div>
                <div class="line">PREPROCESSING_ACTIVE..........</div>
                <div class="line">AES_256_CIPHER_LOCK_ACTIVE....</div>
                <div class="line">CLOAKING_PROTOCOL_STANDBY.....</div>
                <div class="line">THERMAL UPLINK ESTABLISHED....</div>
                <div class="line">PREY_SIGNATURE_DETECTED.......</div>
                <div class="line">TRIANGULATING_COORDINATES.....</div>
                <div class="line">THERMAL_UPLINK_STABLE.........</div>
                <div class="line">HUNT_PARAMETERS_ESTABLISHED...</div>
            </div>
        </div> -->
        <!-- Navbar -->
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <nav class="sidebar" id="sidebar">
            <ul>
                <div class="menu df fd-c encrypt-face">
                    <button class="btn" id="btn1" data-side="front">1</button>
                    <button class="btn" id="btn2" data-side="right">2</button>
                    <button class="btn" id="btn3" data-side="back">3</button>
                    <button class="btn" id="btn4" data-side="left">4</button>
                    <button class="btn" id="btn5" data-side="top">5</button>
                    <button class="btn" id="btn6" data-side="bottom">6</button>
                </div>
            </ul>
            <div class="theme-switches" id="theme">
                <button class="theme-btn blue-glyph" id="blue" onclick="setTheme('blue')">1</button>
                <button class="theme-btn green-glyph" id="green" onclick="setTheme('green')">2</button>
            </div>
        </nav>
        <div id="theme-overlay"></div>
        <!-- Scene wrapper -->
        <section class="scene">
            <!-- Front view -->
            <div class="cube show-front" id="cube" data-side="front">

                <!-- Front -->
                <div class="cube-face cube-face-front">
                    <div class="laser-scan"></div>
                    <div class="hud-overlay">
                        <h2 class="terminal-title">ZIFR@_PREDATOR</h2>
                        <div class="scan-line-horizontal"></div>
                    </div>
                    <div class="panel-content">

                        <div class="input-eye">
                            <input type="password" class="passInput" placeholder="Enter secure key..."
                                oninput="updateStrength(this)">
                            <button onclick="togglePassword(this)" class="eye-btn">👁️</button>
                        </div>

                        <div class="strength-container">
                            <div class="strength-bar"></div>
                            <div class="strength-label">Strength: Empty</div>
                        </div>


                        <textarea class="mainInput" id="encrypterInput" placeholder="Message..."></textarea>
                        <button onclick="handleEncrypt()">PROCESS</button>
                        <div class="terminal-controls">
                            <button onclick="terminalPaste('.cube-face-front .mainInput')"
                                class="control-btn">LINK_DATA</button>
                            <button onclick="terminalPurge('.cube-face-front .mainInput')"
                                class="control-btn btn-purge">PURGE</button>
                            <button onclick="terminalCopy(event, '.cube-face-front .resultOutput')"
                                class="control-btn">CLONE_EXTRACT</button>
                        </div>
                        <textarea readonly class="resultOutput output-box" id="encrypted_output"></textarea>
                    </div>
                </div>

                <div class="cube-face cube-face-back">
                    <div class="laser-scan"></div>
                    <p class="intro-heading">Abo<span>ut</span></p>
                </div>

                <!-- Right -->
                <div class="cube-face cube-face-right">
                    <div class="laser-scan"></div>
                    <div class="hud-overlay">
                        <h2 class="terminal-title">DECRYPTION_ACTIVE</h2>
                        <div class="scan-line-horizontal"></div>
                    </div>
                    <div class="panel-content">

                        <div class="input-eye">
                            <input type="password" class="passInput" placeholder="Enter secure key..."
                                oninput="updateStrength(this)">
                            <button onclick="togglePassword(this)" class="eye-btn">👁️</button>
                        </div>
                        <div class="strength-container">
                            <div class="strength-bar"></div>
                            <div class="strength-label">Strength: Empty</div>
                        </div>

                        <textarea readonly class="mainInput" id="decrypter_input" placeholder="Cipher..."></textarea>
                        <button onclick="handleDecrypt()">PROCESS</button>
                        <div class="terminal-controls">
                            <button onclick="terminalPaste('.cube-face-right .mainInput')"
                                class="control-btn">LINK_DATA</button>
                            <button onclick="terminalPurge('.cube-face-right .mainInput')"
                                class="control-btn btn-purge">PURGE</button>
                            <button onclick="terminalCopy(event, '.cube-face-right .resultOutput')"
                                class="control-btn">CLONE_EXTRACT</button>
                        </div>
                        <textarea class="resultOutput output-box" id="decrypter_output"></textarea>
                    </div>
                </div>

                <!-- Left -->
                <div class="cube-face cube-face-left">
                    <div class="laser-scan"></div>
                    <p class="intro-heading">How<span>it</span>Works</p>
                </div>

                <!-- Top -->
                <div class="cube-face cube-face-top">
                    <div class="laser-scan"></div>
                    <p class="intro-heading"><span>How</span>to use</p>
                </div>


                <!-- Bottom -->
                <div class="cube-face cube-face-bottom">
                    <div class="laser-scan"></div>
                    <p class="intro-heading">Con<span>tacts</span></p>
                </div>


            </div>

        </section>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
