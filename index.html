<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rav Crypto Dashboard</title>
</head>
<body>

<div class="container">
    <h2>RAV_PROCESSOR_v2</h2>
    
<label>MASTER PASSWORD:</label>
<div style="display: flex; gap: 5px;">
    <input type="password" id="passInput" placeholder="Enter secure key..." oninput="updateStrength()">
    <button onclick="togglePassword()" style="margin-top:0; padding: 0 10px;">👁️</button>
</div>
<div id="strengthBar" class="strength-bar"></div>
<div id="strengthLabel" class="label">Strength: Empty</div>

    <hr style="border: 0.5px solid #00ff41; margin: 20px 0;">

    <label>INPUT TEXT:</label>
    <textarea id="mainInput" placeholder="Type message here..."></textarea>

    <button onclick="handleEncrypt()">ENCRYPT</button>
    <button onclick="handleDecrypt()">DECRYPT</button>

    <h3>OUTPUT:</h3>
    <div id="resultOutput" class="output-box"></div>
</div>

<script>
  function togglePassword() {
    const input = document.getElementById('passInput');
    // If it's a password, make it text. If it's text, make it a password.
    if (input.type === "password") {
        input.type = "text";
    } else {
        input.type = "password";
    }
}
    // --- MASKING CONFIGURATION ---
    const B64_CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=";
    // const MASK_CHARS = "ΛΣΔΦΨΩαβγδεζηθικλμνξπρστυφχψω0123456789¡¢£¤¥¦§¨©ª«¬®¯°±²³´µ¶·¸¹º»";
    const MASK_CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=";

    function applyMask(str) {
        return str.split('').map(char => {
            const index = B64_CHARS.indexOf(char);
            return index !== -1 ? MASK_CHARS[index] : char;
        }).join('');
    }

    function removeMask(str) {
        return str.split('').map(char => {
            const index = MASK_CHARS.indexOf(char);
            return index !== -1 ? B64_CHARS[index] : char;
        }).join('');
    }

    // --- CORE CRYPTO FUNCTIONS ---
    async function deriveKey(password, salt) {
        const encoder = new TextEncoder();
        const baseKey = await window.crypto.subtle.importKey(
            "raw", encoder.encode(password), "PBKDF2", false, ["deriveKey"]
        );
        return window.crypto.subtle.deriveKey(
            { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
            baseKey,
            { name: "AES-GCM", length: 256 },
            false, ["encrypt", "decrypt"]
        );
    }

    async function encryptBatch(messages, password) {
        const encoder = new TextEncoder();
        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        const key = await deriveKey(password, salt);

        return Promise.all(messages.map(async (msg) => {
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const buffer = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, encoder.encode(msg));

            const saltB64 = btoa(String.fromCharCode(...salt));
            const ivB64 = btoa(String.fromCharCode(...iv));
            const contentB64 = btoa(String.fromCharCode(...new Uint8Array(buffer)));

            return applyMask(`${saltB64}:${ivB64}:${contentB64}`);
        }));
    }

    async function decryptBatch(encryptedMessages, password) {
        const decoder = new TextDecoder();
        const b64ToUint8 = (b64) => Uint8Array.from(atob(b64), c => c.charCodeAt(0));

        return Promise.all(encryptedMessages.map(async (entry) => {
            try {
                const cleanEntry = removeMask(entry.trim());
                const [sB64, iB64, cB64] = cleanEntry.split(':');
                const salt = b64ToUint8(sB64);
                const iv = b64ToUint8(iB64);
                const data = b64ToUint8(cB64);

                const key = await deriveKey(password, salt);
                const buffer = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
                return decoder.decode(buffer);
            } catch (e) { return "!!! DECRYPTION FAILED !!!"; }
        }));
    }

    // --- UI HELPERS ---
    function updateStrength() {
        const pass = document.getElementById('passInput').value;
        let score = 0;
        if (pass.length > 8) score++;
        if (pass.length > 12) score++;
        if (/[A-Z]/.test(pass)) score++;
        if (/[0-9]/.test(pass)) score++;
        if (/[^A-Za-z0-9]/.test(pass)) score++;

        const colors = ["#ff4c4c", "#ff4c4c", "#ffa500", "#ffd700", "#00ff41", "#00ffff"];
        const labels = ["Dangerous", "Very Weak", "Weak", "Medium", "Strong", "God Mode"];
        
        const bar = document.getElementById('strengthBar');
        bar.style.width = (score + 1) * 16.6 + "%";
        bar.style.backgroundColor = colors[score];
        document.getElementById('strengthLabel').innerText = "Strength: " + labels[score];
    }

    async function handleEncrypt() {
        const pass = document.getElementById('passInput').value;
        const text = document.getElementById('mainInput').value;
        if(!pass || !text) return alert("Need password and text!");
        
        const res = await encryptBatch([text], pass);
        document.getElementById('resultOutput').innerText = res[0];
    }

    async function handleDecrypt() {
        const pass = document.getElementById('passInput').value;
        const text = document.getElementById('mainInput').value;
        if(!pass || !text) return alert("Need password and encrypted text!");

        const res = await decryptBatch([text], pass);
        document.getElementById('resultOutput').innerText = res[0];
    }

    async function copyToClipboard() {
    const text = document.getElementById('resultOutput').innerText;
    if (!text || text === "!!! DECRYPTION FAILED !!!") return;
    
    try {
        await navigator.clipboard.writeText(text);
        // Optional: Change button text temporarily to show success
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = "COPIED!";
        setTimeout(() => btn.innerText = originalText, 2000);
    } catch (err) {
        console.error('Failed to copy: ', err);
    }
}
</script>

</body>
</html>
